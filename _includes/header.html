<header class="py-6 lg:py-8 lg:px-0 md:flex items-end justify-between">
    <a class="font-semibold block border-b-2 border-dotted border-stone-300 pb-6 mb-6 md:border-0 md:p-0 md:m-0" href="{{ "/" | relative_url }}">
        {{ site.title }}
    
        <span class="text-stone-500 block">
            {{ site.subtitle }}
        </span>  
    </a>

    <nav>
        <ul class="list-none flex gap-6">
            {% for nav in site.data.navigation %}
                <li 
                    class="
                        font-semibold  decoration-2 decoration-dotted hover:underline hover:text-stone-500 transition
                        {% if nav.url == page.url %} underline text-stone-500 {% endif %}"
                    >
                    <a href="{{ nav.url }}">{{ nav.text }}</a>
                </li>
            {% endfor %}
        </ul>
    </nav>

</header>

<div class="border-t-2 border-stone-300 border-dotted pt-6">
    <h2 class="font-semibold relative text-lg mb-6 lg:mb-12">Projects</h2>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
        {% assign sorted_projects = site.projects | sort: "order" %}
        {% for project in sorted_projects %}
            <div class="relative group">  
                <img class="aspect-group-hover:opacity-90 transition mb-3" src="{{ project.thumbnail | relative_url }}">

                <h2 class="font-semibold text-sm md:text-base underline decoration-dotted decoration-2 group-hover:decoration-0 group-hover:no-underline group-hover:text-stone-500 transition">
                    {{ project.title }}
                </h2>

                <a class="absolute inset-0 z-10" href="{{ project.url | relative_url }}"></a>
            </div>
        {% endfor %}
    </div>
</div>
